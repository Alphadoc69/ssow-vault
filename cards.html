function skinGroup(skin) {
  if (['Black','Dark Gray'].includes(skin)) return 'DARK';
  if (['White','Light Gray','Light Blue'].includes(skin)) return 'LIGHT';
  if (['Tan','Pink','Red'].includes(skin)) return 'WARM';
  if (['Blue','Green'].includes(skin)) return 'COOL';
  return 'NEUTRAL';
}

function getPersonality(tokenId, traits) {
  if (!traits) return { name: `WHALE #${tokenId}`, subtitle: 'OG SINCE 2021', quote: '"#TogetherWeWhale"' };

  const fins = (traits.fins || '').trim();
  const blowholeRing = (traits.blowholeRing || '').trim();
  const skin = traits.skin || '';
  const eyes = (traits.eyes || '').trim();
  const hat = (traits.hat || '').trim();
  const outfit = (traits.outfit || '').trim();
  const mouth = (traits.mouth || '').trim();

  // Priority 1: Fins (rarest ~400 total)
  if (fins && fins !== 'None' && FINS[fins]) return FINS[fins];

  // Priority 2: Special skins (~100-200 each)
  if (skin && SPECIAL_SKIN[skin]) return SPECIAL_SKIN[skin];

  // Priority 3: Special eyes (~10-50 each)
  if (eyes && SPECIAL_EYES[eyes]) return SPECIAL_EYES[eyes];

  // Priority 4: Hat overrides (rarest hats)
  if (hat && HAT_OVERRIDES[hat]) return HAT_OVERRIDES[hat];

  // Priority 5: Eyes × skin matrix (main engine)
  if (eyes && EYE_SKIN[eyes]) {
    const group = skinGroup(skin);
    const p = EYE_SKIN[eyes][group];
    if (p) {
      // Enhance with outfit if available
      if (outfit && OUTFIT_NAMES[outfit]) {
        return {
          name: p.name,
          subtitle: OUTFIT_SUBTITLES[outfit] || p.subtitle,
          quote: OUTFIT_QUOTES[outfit] || p.quote,
        };
      }
      return p;
    }
  }

  // Priority 6: Outfit standalone
  if (outfit && OUTFIT_NAMES[outfit]) {
    return {
      name: OUTFIT_NAMES[outfit],
      subtitle: OUTFIT_SUBTITLES[outfit] || 'OG WHALE',
      quote: OUTFIT_QUOTES[outfit] || '"#TogetherWeWhale"',
    };
  }

  // Priority 7: Skin fallback
  const SKIN_FALLBACKS = {
    'Black':      { name: 'THE SHADOW HOLDER',    subtitle: 'MOVES UNSEEN',               quote: '"you didn\'t see me buy. you won\'t see me sell."' },

}

function tierClass(rank) {
  if (rank <= 100) return 'legendary';
  if (rank <= 500) return 'epic';
  if (rank <= 1000) return 'rare';
  return '';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const shortAddr = a => a.slice(0, 6) + '…' + a.slice(-4);
const CONTRACT = '0x42d2b41c5bb1f73f06d5adaa85e23b44f75c4cd2';

// ─── RENDER ───────────────────────────────────────────────────────────────
function renderCards(nfts) {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';

  nfts.forEach(nft => {
    const tokenId = nft.identifier || nft.token_id || '???';
    const name = nft.name || `Whale #${tokenId}`;
    const imageUrl = nft.display_image_url || nft.image_url || '';
    const osLink = `https://opensea.io/assets/ethereum/${nft.contract || CONTRACT}/${tokenId}`;
    const traitData = window.WHALE_TRAITS?.[String(tokenId)];
    const rank = traitData?.rank ?? 9999;
    const personality = getPersonality(tokenId, traitData);
    const tier = tierClass(rank);

    const wrap = document.createElement('div');
    wrap.className = `whale-card ${tier}`;

    wrap.innerHTML = `
      <div class="card-inner">
        <div class="card-header">
          <div class="card-id">#${esc(String(tokenId))}</div>
          <div class="card-cert">
            <div class="card-cert-top">CERTIFIED<br>GEM MINT</div>
          </div>
        </div>
        <div class="card-image-wrap">
          ${imageUrl
            ? `<img src="${esc(imageUrl)}" alt="${esc(name)}" loading="lazy" crossorigin="anonymous" />`
            : `<div class="card-placeholder">🐋</div>`
          }
        </div>
        <div class="card-body">
          <div class="card-personality">${esc(personality.name)}</div>
          <div class="card-subtitle">${esc(personality.subtitle)}</div>
          <div class="card-quote">${esc(personality.quote)}</div>
          <div class="card-footer">
            <div class="card-brand">
              <span class="card-brand-icon">🐋</span>
              <span class="card-brand-name">SSoW</span>
            </div>
            <div class="card-number">${esc(String(tokenId))} / 10,000</div>
          </div>
        </div>
      </div>
      <div class="card-actions">
        <button class="card-action-btn" onclick="window.open('${esc(osLink)}', '_blank')">OpenSea ↗</button>
        <button class="card-action-btn share" onclick="shareCard(${JSON.stringify(String(tokenId)).replace(/"/g,'&quot;')}, ${JSON.stringify(personality.name).replace(/"/g,'&quot;')})">Share 𝕏</button>
      </div>
    `;

    grid.appendChild(wrap);
  });
}

function shareCard(tokenId, personalityName) {
  const text = `My SSoW Whale #${tokenId} is ${personalityName} 🐋\n\nDiscover your whale's personality:\nssow-vault.vercel.app/cards\n\n#TogetherWeWhale #SecretSocietyOfWhales`;
  const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}

// ─── FETCH ────────────────────────────────────────────────────────────────
function setStatus(msg, err = false) {
  const el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = 'status' + (err ? ' error' : '');
}

async function fetchAllNFTs(wallet) {
  const all = []; let next = null;
  do {
    const p = new URLSearchParams({ wallet });
    if (next) p.set('next', next);
    const res = await fetch(`/api/whales?${p}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `Error ${res.status}`);
    all.push(...(data.nfts || []));
    next = data.next || null;
    setStatus(`<span class="spinner"></span> Loading… ${all.length} whales surfaced`);
  } while (next);
  return all;
}

async function fetchWhales() {
  const wallet = document.getElementById('walletInput').value.trim();
  if (!wallet) return;
  if (!wallet.startsWith('0x') || wallet.length < 10) {
    setStatus('Please enter a valid Ethereum wallet address.', true);
    return;
  }

  document.getElementById('searchBtn').disabled = true;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('cardGrid').innerHTML = '';
  setStatus('<span class="spinner"></span> Diving into the blockchain…');

  try {
    const nfts = await fetchAllNFTs(wallet);
    if (!nfts.length) {
      setStatus('No SSoW NFTs found for this wallet.');
      document.getElementById('emptyState').style.display = 'block';
      return;
    }

    // Sort by rarity (rarest first)
    nfts.sort((a, b) => {
      const ra = window.WHALE_TRAITS?.[String(a.identifier)]?.rank ?? 99999;
      const rb = window.WHALE_TRAITS?.[String(b.identifier)]?.rank ?? 99999;
      return ra - rb;
    });

    document.getElementById('nftCount').textContent = nfts.length;
    document.getElementById('walletDisplay').textContent = shortAddr(wallet);
    setStatus('');
    document.getElementById('resultsSection').style.display = 'block';
    renderCards(nfts);

  } catch (err) {
    console.error(err);
    setStatus(`Error: ${err.message}`, true);
    document.getElementById('emptyState').style.display = 'block';
  } finally {
    document.getElementById('searchBtn').disabled = false;
  }
}

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('walletInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchWhales();
  });
});
</script>
