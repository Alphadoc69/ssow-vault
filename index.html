<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSoW PSA Vault | Secret Society of Whales</title>
  <meta name="description" content="View your Secret Society of Whales NFTs as certified PSA 10 Gem Mint graded cards." />
  <meta property="og:title" content="SSoW PSA Vault" />
  <meta property="og:description" content="Your whales, graded. PSA 10 Gem Mint. Every time. 🐋" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ocean-deep:   #020c18;
      --ocean-mid:    #041830;
      --ocean-blue:   #062a50;
      --ocean-glow:   #0a4a8a;
      --foam:         #7eb8e8;
      --foam-light:   #b8d8f4;
      --gold:         #f5c518;
      --gold-dark:    #c49a0a;
      --gold-dim:     #8a6e0a;
      --psa-blue:     #1a3a70;
      --psa-blue-mid: #1e4898;
      --psa-accent:   #2666cc;
      --white:        #ffffff;
      --off-white:    #e8f0f8;
      --muted:        #7a9bbc;
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono:    'DM Mono', monospace;
      --font-body:    'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--ocean-deep);
      color: var(--off-white);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(10,74,138,0.35) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 100%, rgba(6,42,80,0.5) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 10% 80%, rgba(4,24,48,0.8) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(126,184,232,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 70%, rgba(126,184,232,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 20%, rgba(126,184,232,0.25) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 90%, rgba(126,184,232,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 60%, rgba(126,184,232,0.2) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
      animation: drift 20s ease-in-out infinite alternate;
    }

    @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-12px); } }

    .site-wrap { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 2rem; }

    header {
      text-align: center;
      padding: 4rem 0 2.5rem;
      border-bottom: 0.5px solid rgba(126,184,232,0.15);
      margin-bottom: 3rem;
    }

    .logo-whale {
      font-size: 3.5rem;
      line-height: 1;
      margin-bottom: 0.5rem;
      display: block;
      filter: drop-shadow(0 0 20px rgba(126,184,232,0.5));
      animation: bob 4s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .site-title {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 6rem);
      letter-spacing: 0.08em;
      line-height: 0.9;
      background: linear-gradient(135deg, var(--white) 0%, var(--foam-light) 40%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .site-subtitle {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    .header-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    .header-links a {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      border: 0.5px solid rgba(126,184,232,0.2);
      padding: 6px 14px;
      border-radius: 2px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .header-links a:hover {
      color: var(--foam-light);
      border-color: rgba(126,184,232,0.5);
      background: rgba(126,184,232,0.05);
    }

    .search-section {
      max-width: 620px;
      margin: 0 auto 3.5rem;
      text-align: center;
    }

    .search-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .search-label {
      font-family: var(--font-display);
      font-size: 1.8rem;
      letter-spacing: 0.06em;
      color: var(--off-white);
      margin-bottom: 1.25rem;
    }

    .search-row {
      display: flex;
      gap: 0;
      border: 1px solid rgba(126,184,232,0.25);
      border-radius: 3px;
      overflow: hidden;
      background: rgba(4,24,48,0.8);
      backdrop-filter: blur(8px);
      transition: border-color 0.2s;
    }
    .search-row:focus-within {
      border-color: rgba(126,184,232,0.6);
      box-shadow: 0 0 0 3px rgba(126,184,232,0.08);
    }

    .search-row input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--off-white);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      padding: 14px 18px;
    }
    .search-row input::placeholder { color: rgba(122,155,188,0.5); }

    .search-btn {
      background: linear-gradient(135deg, var(--psa-blue) 0%, var(--psa-blue-mid) 100%);
      border: none;
      color: var(--off-white);
      font-family: var(--font-display);
      font-size: 1rem;
      letter-spacing: 0.12em;
      padding: 0 28px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .search-btn:hover { background: linear-gradient(135deg, var(--psa-blue-mid) 0%, var(--psa-accent) 100%); }
    .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-top: 1rem;
      min-height: 1.4em;
      text-align: center;
    }
    .status.error { color: #f07070; }

    .results-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 0.5px solid rgba(126,184,232,0.12);
    }

    .results-count {
      font-family: var(--font-display);
      font-size: 1.6rem;
      letter-spacing: 0.06em;
      color: var(--off-white);
    }
    .results-count span { color: var(--gold); }

    .results-wallet {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 2.5rem;
      padding-bottom: 5rem;
    }

    .slab-wrapper {
      perspective: 1000px;
      cursor: pointer;
    }

    .slab-wrapper:hover .slab {
      transform: rotateY(4deg) rotateX(-2deg) scale(1.03);
      box-shadow:
        -8px 12px 40px rgba(0,0,0,0.6),
        0 0 30px rgba(126,184,232,0.12),
        inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .slab {
      background: linear-gradient(180deg, #d4e4f4 0%, #b8cfe8 100%);
      border-radius: 6px;
      overflow: hidden;
      box-shadow:
        -4px 6px 24px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.1);
      transform: rotateY(0) rotateX(0) scale(1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      transform-style: preserve-3d;
      animation: slabReveal 0.5s ease both;
    }

    @keyframes slabReveal {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .slab-top {
      background: linear-gradient(180deg, #0d2a5e 0%, #1a3a80 50%, #1e4898 100%);
      padding: 10px 14px 8px;
      position: relative;
      overflow: hidden;
    }
    .slab-top::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    }

    .psa-brand { display: flex; align-items: baseline; gap: 8px; }
    .psa-logo-text {
      font-family: 'Arial Black', Impact, sans-serif;
      font-size: 26px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 3px;
      line-height: 1;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }
    .psa-full-name {
      font-family: Arial, sans-serif;
      font-size: 7px;
      color: rgba(168,200,240,0.8);
      letter-spacing: 1px;
      text-transform: uppercase;
      line-height: 1.3;
    }

    .slab-meta { display: flex; justify-content: space-between; margin-top: 6px; }
    .slab-meta-label {
      font-family: Arial, sans-serif;
      font-size: 6.5px;
      color: rgba(168,200,240,0.6);
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }
    .slab-meta-value {
      font-family: Arial, sans-serif;
      font-size: 9px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    .slab-window { background: #c8daea; padding: 8px; }

    .slab-card {
      width: 100%;
      aspect-ratio: 1;
      background: #0a1a2e;
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .slab-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .slab-wrapper:hover .slab-card img { transform: scale(1.04); }

    .slab-card-loading {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(126,184,232,0.3);
      font-size: 2rem;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.8} }

    .slab-bottom {
      background: linear-gradient(180deg, #1a3a80 0%, #0d2a5e 100%);
      padding: 8px 14px 10px;
      position: relative;
      overflow: hidden;
    }
    .slab-bottom::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    }

    .slab-grade-row { display: flex; align-items: center; justify-content: space-between; }
    .slab-grade-label {
      font-family: Arial, sans-serif;
      font-size: 7.5px;
      color: rgba(168,200,240,0.7);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .slab-gem-mint {
      font-family: 'Arial Black', Impact, sans-serif;
      font-size: 11.5px;
      font-weight: 900;
      color: #f5c518;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .slab-grade-badge {
      background: linear-gradient(135deg, #f5c518 0%, #e8b010 100%);
      color: #0d2a5e;
      font-family: 'Arial Black', Impact, sans-serif;
      font-size: 32px;
      font-weight: 900;
      padding: 2px 14px;
      border-radius: 3px;
      line-height: 1.15;
      letter-spacing: 1px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .slab-card-info {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 0.5px solid rgba(255,255,255,0.12);
    }
    .slab-card-name {
      font-family: Arial, sans-serif;
      font-size: 9px;
      font-weight: 700;
      color: rgba(232,240,252,0.9);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .slab-card-id {
      font-family: Arial, sans-serif;
      font-size: 7.5px;
      color: rgba(168,200,240,0.5);
      letter-spacing: 1px;
      text-align: center;
      margin-top: 2px;
    }

    .slab-opensea {
      display: block;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-decoration: none;
      margin-top: 0.6rem;
      padding: 5px 0;
      border: 0.5px solid rgba(126,184,232,0.15);
      border-radius: 2px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .slab-opensea:hover {
      color: var(--foam-light);
      border-color: rgba(126,184,232,0.4);
      background: rgba(126,184,232,0.05);
    }

    .state-empty {
      text-align: center;
      padding: 6rem 0;
    }
    .state-empty .whale-icon {
      font-size: 4rem;
      display: block;
      margin-bottom: 1rem;
      opacity: 0.3;
      animation: bob 4s ease-in-out infinite;
    }
    .state-empty p {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(126,184,232,0.2);
      border-top-color: var(--foam);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      padding: 2rem 0 3rem;
      border-top: 0.5px solid rgba(126,184,232,0.1);
      margin-top: 4rem;
    }
    footer p {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: rgba(122,155,188,0.4);
      text-transform: uppercase;
    }
    footer a { color: rgba(122,155,188,0.6); text-decoration: none; }
    footer a:hover { color: var(--foam); }

    @media (max-width: 640px) {
      .site-wrap { padding: 0 1rem; }
      header { padding: 2.5rem 0 1.5rem; }
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.5rem; }
      .results-header { flex-direction: column; gap: 0.4rem; }
    }
  </style>
</head>
<body>

<div class="site-wrap">

  <header>
    <span class="logo-whale">🐋</span>
    <h1 class="site-title">SSoW PSA VAULT</h1>
    <p class="site-subtitle">Secret Society of Whales · Certified Gem Mint</p>
    <nav class="header-links">
      <a href="https://www.secretsocietyofwhales.com/" target="_blank" rel="noopener">Website</a>
      <a href="https://opensea.io/collection/secretsocietyofwhales" target="_blank" rel="noopener">OpenSea</a>
      <a href="https://x.com/SSofWhales" target="_blank" rel="noopener">Twitter</a>
    </nav>
  </header>

  <section class="search-section">
    <p class="search-eyebrow">// Enter Wallet Address</p>
    <h2 class="search-label">GRADE YOUR POD</h2>
    <div class="search-row">
      <input
        type="text"
        id="walletInput"
        placeholder="0x…"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="search-btn" id="searchBtn" onclick="fetchWhales()">DIVE IN</button>
    </div>
    <p class="status" id="status"></p>
  </section>

  <section id="resultsSection" style="display:none">
    <div class="results-header">
      <div class="results-count"><span id="nftCount">0</span> WHALES GRADED</div>
      <div class="results-wallet" id="walletDisplay"></div>
    </div>
    <div class="card-grid" id="cardGrid"></div>
  </section>

  <div class="state-empty" id="emptyState">
    <span class="whale-icon">🐋</span>
    <p>Enter your wallet to surface your whales</p>
  </div>

  <footer>
    <p>
      SSoW PSA Vault · Fan-made tool ·
      <a href="https://www.secretsocietyofwhales.com/" target="_blank" rel="noopener">Secret Society of Whales</a>
      · #TogetherWeWhale
    </p>
  </footer>

</div>

<script>
  const $ = id => document.getElementById(id);
  let certCounter = 10000000 + Math.floor(Math.random() * 89999999);
  function nextCert() { return (++certCounter).toString(); }
  function shortWallet(addr) { return addr.slice(0, 6) + '…' + addr.slice(-4); }

  function setStatus(msg, isError = false) {
    const el = $('status');
    el.innerHTML = msg;
    el.className = 'status' + (isError ? ' error' : '');
  }

  window.addEventListener('DOMContentLoaded', () => {
    $('walletInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchWhales();
    });
  });

  // Calls YOUR serverless function at /api/whales — API key never touches the browser
  async function fetchAllNFTs(wallet) {
    const allNFTs = [];
    let next = null;

    do {
      const params = new URLSearchParams({ wallet });
      if (next) params.set('next', next);

      const res = await fetch(`/api/whales?${params}`);
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || `Error ${res.status}`);

      allNFTs.push(...(data.nfts || []));
      next = data.next || null;

      setStatus(`<span class="spinner"></span> Loading… ${allNFTs.length} whales surfaced`);

    } while (next);

    return allNFTs;
  }

  async function fetchWhales() {
    const wallet = $('walletInput').value.trim();
    if (!wallet) return;
    if (!wallet.startsWith('0x') || wallet.length < 10) {
      setStatus('Please enter a valid Ethereum wallet address.', true);
      return;
    }

    $('searchBtn').disabled = true;
    $('emptyState').style.display = 'none';
    $('resultsSection').style.display = 'none';
    $('cardGrid').innerHTML = '';
    setStatus('<span class="spinner"></span> Diving into the blockchain…');

    try {
      const nfts = await fetchAllNFTs(wallet);

      if (nfts.length === 0) {
        setStatus('No SSoW NFTs found for this wallet. 🐳');
        $('emptyState').style.display = 'block';
        return;
      }

      $('nftCount').textContent = nfts.length;
      $('walletDisplay').textContent = shortWallet(wallet);
      setStatus('');
      $('resultsSection').style.display = 'block';
      renderSlabs(nfts);

    } catch (err) {
      console.error(err);
      setStatus(`Error: ${err.message}`, true);
      $('emptyState').style.display = 'block';
    } finally {
      $('searchBtn').disabled = false;
    }
  }

  function renderSlabs(nfts) {
    const grid = $('cardGrid');
    grid.innerHTML = '';

    nfts.forEach((nft, i) => {
      const cert = nextCert();
      const tokenId = nft.identifier || nft.token_id || '???';
      const name = nft.name || `Whale #${tokenId}`;
      const imageUrl = nft.display_image_url || nft.image_url || '';
      const osLink = `https://opensea.io/assets/ethereum/${nft.contract || '0x42d2b41c5bb1f73f06d5adaa85e23b44f75c4cd2'}/${tokenId}`;

      const wrapper = document.createElement('div');
      wrapper.className = 'slab-wrapper';
      wrapper.style.animationDelay = `${i * 0.04}s`;

      wrapper.innerHTML = `
        <div class="slab">
          <div class="slab-top">
            <div class="psa-brand">
              <span class="psa-logo-text">PSA</span>
              <span class="psa-full-name">Professional<br>Sports Authenticator</span>
            </div>
            <div class="slab-meta">
              <div class="slab-meta-item">
                <div class="slab-meta-label">Cert #</div>
                <div class="slab-meta-value">${cert}</div>
              </div>
              <div class="slab-meta-item" style="text-align:right">
                <div class="slab-meta-label">Year</div>
                <div class="slab-meta-value">2025</div>
              </div>
            </div>
          </div>
          <div class="slab-window">
            <div class="slab-card">
              ${imageUrl
                ? `<img src="${esc(imageUrl)}" alt="${esc(name)}" loading="lazy" />`
                : `<div class="slab-card-loading">🐋</div>`}
            </div>
          </div>
          <div class="slab-bottom">
            <div class="slab-grade-row">
              <div>
                <div class="slab-grade-label">Grade</div>
                <div class="slab-gem-mint">Gem Mint</div>
              </div>
              <div class="slab-grade-badge">10</div>
            </div>
            <div class="slab-card-info">
              <div class="slab-card-name">${esc(name)}</div>
              <div class="slab-card-id">Token #${esc(String(tokenId))}</div>
            </div>
          </div>
        </div>
        <a class="slab-opensea" href="${esc(osLink)}" target="_blank" rel="noopener">↗ View on OpenSea</a>
      `;

      grid.appendChild(wrapper);
    });
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
